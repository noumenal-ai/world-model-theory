# World-Model Theory — site/corpus verification (public repo)
# Checks (chips resolve + no sorry) on every push / dispatch; the badge reflects pass/fail.
# No commit-back: verification.json is committed with each site deploy, so this workflow does
# not push (that previously spawned racing Pages deploys).
name: verify

on:
  push:
    paths: ['docs/**', 'WMSpec/**', 'TLT_Proofs/**', 'ci/**', '.github/workflows/verify.yml']
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run verification (chips + sorry, from the site's own citations)
        run: |
          chmod +x ci/verify.sh
          ci/verify.sh docs/verification.json
      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: verification
          path: docs/verification.json
